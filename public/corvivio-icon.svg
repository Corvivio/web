<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180" role="img">
  <title>Corvivio</title>

  <circle cx="90" cy="90" r="88" fill="#C05A2E"/>

  <circle cx="90" cy="90" r="66" fill="none"
    stroke="#FAF9F7" stroke-width="1.5"
    stroke-dasharray="7 5" stroke-linecap="round" opacity="0.22"/>

  <!-- lead dancer (cream) -->
  <circle cx="70" cy="44" r="13" fill="#FAF9F7"/>
  <ellipse cx="78" cy="96" rx="22" ry="33" fill="#FAF9F7"
    transform="rotate(14,78,96)"/>

  <!-- follow dancer (warm amber) -->
  <circle cx="116" cy="68" r="11" fill="#FFDEA0"/>
  <ellipse cx="106" cy="116" rx="20" ry="30" fill="#FFDEA0"
    transform="rotate(-14,106,116)"/>
</svg>
